<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Dance · 後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f7;--surface:#fff;--sidebar:#1d1d1f;--sidebar-active:#0071e3;
    --text-primary:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
    --accent:#0071e3;--accent-light:#e8f0fe;
    --border:rgba(0,0,0,0.08);
    --shadow-sm:0 2px 8px rgba(0,0,0,.06);
    --shadow-md:0 8px 32px rgba(0,0,0,.10);
    --radius:14px;--radius-sm:10px;--radius-xs:7px;
    --font:'Noto Sans TC',-apple-system,sans-serif;
    --status-pending:#ff9f0a;--status-checked:#34c759;
    --status-imported:#0071e3;--status-done:#8e8e93;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font);background:var(--bg);
    color:var(--text-primary);-webkit-font-smoothing:antialiased}

  /* ── LOGIN ── */
  .login-wrap{display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px}
  .login-card{background:var(--surface);border-radius:var(--radius);
    padding:48px 44px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
  .login-logo{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
  .login-sub{font-size:14px;color:var(--text-secondary);margin-bottom:36px}
  .login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  .login-field label{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.03em}
  .login-field input{font-family:var(--font);font-size:16px;padding:12px 14px;
    border:1.5px solid var(--border);border-radius:var(--radius-xs);outline:none;
    background:var(--bg);transition:border-color .18s}
  .login-field input:focus{border-color:var(--accent);background:#fff}
  .login-err{font-size:13px;color:#c0392b;margin-bottom:12px;display:none}
  .login-err.show{display:block}
  .btn-login{width:100%;background:var(--accent);color:#fff;border:none;
    border-radius:100px;padding:14px;font-family:var(--font);font-size:16px;
    font-weight:500;cursor:pointer;margin-top:8px;transition:opacity .2s}
  .btn-login:hover{opacity:.88}
  .btn-login:disabled{opacity:.5;pointer-events:none}

  /* ── LAYOUT ── */
  .app{display:none;height:100vh;overflow:hidden}
  .app.show{display:flex}

  /* SIDEBAR */
  .sidebar{width:220px;flex-shrink:0;background:var(--sidebar);
    display:flex;flex-direction:column;overflow:hidden}
  .sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
  .sidebar-logo-text{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .sidebar-user{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px}
  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
  .nav-section{padding:8px 20px 4px;font-size:10px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;
    font-size:14px;font-weight:500;color:rgba(255,255,255,.65);
    cursor:pointer;transition:all .15s;border-left:3px solid transparent}
  .nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
  .nav-item.active{color:#fff;background:rgba(0,113,227,.25);border-left-color:var(--accent)}
  .nav-item .icon{font-size:16px;width:20px;text-align:center}
  .nav-badge{margin-left:auto;background:var(--accent);color:#fff;
    font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px}
  .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
  .btn-logout{width:100%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);
    border:none;border-radius:var(--radius-xs);padding:9px;font-family:var(--font);
    font-size:13px;cursor:pointer;transition:all .15s}
  .btn-logout:hover{background:rgba(255,255,255,.14);color:#fff}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .btn-refresh{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);
    padding:7px 14px;font-family:var(--font);font-size:13px;font-weight:500;
    cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;color:var(--text-secondary)}
  .btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
  .content{flex:1;overflow-y:auto;padding:24px 28px}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:20px 18px;
    box-shadow:var(--shadow-sm);border:1px solid var(--border)}
  .stat-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text-tertiary);margin-bottom:8px}
  .stat-value{font-size:28px;font-weight:700;letter-spacing:-.8px;color:var(--text-primary)}
  .stat-sub{font-size:12px;color:var(--text-tertiary);margin-top:4px}

  /* FILTERS */
  .filters{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .filter-search{flex:1;min-width:200px;position:relative}
  .filter-search input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);
    border-radius:var(--radius-xs);font-family:var(--font);font-size:14px;outline:none;
    background:var(--surface);transition:border-color .18s}
  .filter-search input:focus{border-color:var(--accent)}
  .filter-search .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--text-tertiary);font-size:14px}
  .filter-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);
    font-family:var(--font);font-size:14px;outline:none;background:var(--surface);
    color:var(--text-primary);cursor:pointer;transition:border-color .18s}
  .filter-select:focus{border-color:var(--accent)}

  /* TABLE */
  .table-wrap{background:var(--surface);border-radius:var(--radius-sm);
    box-shadow:var(--shadow-sm);border:1px solid var(--border);overflow:hidden}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:700px}
  thead{background:var(--bg)}
  th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;color:var(--text-tertiary);
    white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:13px 14px;font-size:13px;color:var(--text-primary);
    border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(0,0,0,.015)}

  /* STATUS BADGE */
  .status-badge{display:inline-flex;align-items:center;gap:5px;
    padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap}
  .s-pending{background:#fff3e0;color:var(--status-pending)}
  .s-checked{background:#e8f8f0;color:#1a7a4a}
  .s-imported{background:var(--accent-light);color:var(--accent)}
  .s-done{background:#f0f0f2;color:var(--status-done)}

  /* STATUS SELECT */
  .status-select{padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--radius-xs);
    font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;
    outline:none;background:var(--surface);transition:border-color .15s;min-width:110px}
  .status-select:focus{border-color:var(--accent)}
  .status-select.saving{opacity:.5;pointer-events:none}

  /* TYPE BADGE */
  .type-badge{display:inline-block;padding:3px 8px;border-radius:4px;
    font-size:11px;font-weight:600;white-space:nowrap}
  .t-reservation{background:#f0f0f2;color:var(--text-secondary)}
  .t-plan{background:#fff3cd;color:#856404}

  /* EMPTY */
  .empty-state{text-align:center;padding:64px 24px;color:var(--text-tertiary)}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:15px}

  /* LOADING */
  .loading-wrap{text-align:center;padding:64px 24px;color:var(--text-tertiary)}
  .spinner{display:inline-block;width:32px;height:32px;
    border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text-primary);
    color:#fff;padding:12px 20px;border-radius:var(--radius-xs);font-size:14px;
    font-weight:500;box-shadow:var(--shadow-md);z-index:999;
    transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}

  /* MOBILE */
  @media(max-width:768px){
    .sidebar{display:none}
    .content{padding:16px}
    .topbar{padding:0 16px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-page">
  <div class="login-card">
    <div class="login-logo">JS Dance</div>
    <div class="login-sub">後台管理系統</div>
    <div class="login-field">
      <label>帳號</label>
      <input type="text" id="inp-user" placeholder="輸入帳號" autocomplete="username">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="inp-pass" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err">帳號或密碼錯誤，請再試一次。</div>
    <button class="btn-login" id="btn-login">登入</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">JS Dance</div>
      <div class="sidebar-user" id="sidebar-user">管理員</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">訂單管理</div>
      <div class="nav-item active" data-view="all" onclick="switchView('all')">
        <span class="icon">📋</span> 全部訂單
        <span class="nav-badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" data-view="reservation" onclick="switchView('reservation')">
        <span class="icon">💃</span> 課程報名
        <span class="nav-badge" id="badge-res">0</span>
      </div>
      <div class="nav-item" data-view="plan" onclick="switchView('plan')">
        <span class="icon">💎</span> 點數方案
        <span class="nav-badge" id="badge-plan">0</span>
      </div>
      <div class="nav-section" style="margin-top:8px">狀態篩選</div>
      <div class="nav-item" data-view="pending" onclick="switchView('pending')">
        <span class="icon">🟠</span> 待確認
      </div>
      <div class="nav-item" data-view="checked" onclick="switchView('checked')">
        <span class="icon">🟢</span> 已對帳
      </div>
      <div class="nav-item" data-view="imported" onclick="switchView('imported')">
        <span class="icon">🔵</span> 已匯入點數
      </div>
      <div class="nav-item" data-view="done" onclick="switchView('done')">
        <span class="icon">⚪</span> 已完成
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">全部訂單</div>
      <div class="topbar-right">
        <button class="btn-refresh" onclick="loadOrders()">🔄 重新整理</button>
      </div>
    </div>
    <div class="content">

      <!-- STATS -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">全部訂單</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🟠 待確認</div>
          <div class="stat-value" id="stat-pending" style="color:var(--status-pending)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🟢 已對帳</div>
          <div class="stat-value" id="stat-checked" style="color:#1a7a4a">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🔵 已匯入點數</div>
          <div class="stat-value" id="stat-imported" style="color:var(--accent)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">⚪ 已完成</div>
          <div class="stat-value" id="stat-done" style="color:var(--status-done)">—</div>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <div class="filter-search">
          <span class="icon">🔍</span>
          <input type="text" id="search-inp" placeholder="搜尋姓名、電話、Email…" oninput="renderTable()">
        </div>
        <select class="filter-select" id="filter-course" onchange="renderTable()">
          <option value="">所有課程 / 方案</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <div class="table-scroll">
          <div id="table-container">
            <div class="loading-wrap">
              <div class="spinner"></div>
              <p>載入中…</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzoC22ar-SvmIEHN0xwurS_kJ8eyVK-foH7NPYnc-8SS1n1hKaIeAoPSj5Eg5zUrMBw/exec';

  let allOrders = [];
  let currentView = 'all';
  let currentUser = '';

  // ── UTILS ──
  function toast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  async function gasCall(payload) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      // 不設 Content-Type（避免觸發 CORS preflight）
      // GAS 端用 JSON.parse(e.postData.contents) 接收即可
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  // ── LOGIN ──
  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('btn-login').addEventListener('click', doLogin);

  async function doLogin() {
    const btn  = document.getElementById('btn-login');
    const user = document.getElementById('inp-user').value.trim();
    const pass = document.getElementById('inp-pass').value.trim();
    const err  = document.getElementById('login-err');

    if (!user || !pass) { err.textContent = '請輸入帳號和密碼。'; err.classList.add('show'); return; }

    btn.textContent = '登入中…'; btn.disabled = true;
    try {
      const data = await gasCall({ action: 'login', username: user, password: pass });
      if (data.success) {
        currentUser = data.name;
        document.getElementById('sidebar-user').textContent = data.name;
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('app').classList.add('show');
        loadOrders();
      } else {
        err.textContent = '帳號或密碼錯誤，請再試一次。';
        err.classList.add('show');
      }
    } catch(e) {
      err.textContent = '連線失敗，請檢查網路後再試。';
      err.classList.add('show');
    }
    btn.textContent = '登入'; btn.disabled = false;
  }

  function logout() {
    currentUser = '';
    allOrders = [];
    document.getElementById('app').classList.remove('show');
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('inp-user').value = '';
    document.getElementById('inp-pass').value = '';
  }

  // ── LOAD ORDERS ──
  async function loadOrders() {
    document.getElementById('table-container').innerHTML =
      '<div class="loading-wrap"><div class="spinner"></div><p>載入中…</p></div>';
    try {
      const data = await gasCall({ action: 'getOrders' });
      allOrders = [];

      // reservation rows (skip header row 0)
      const resHeaders = data.reservation[0] || [];
      const statusColRes = resHeaders.length - 1;
      data.reservation.slice(1).forEach((row, i) => {
        if (!row[0]) return; // skip empty
        allOrders.push({
          type:    'reservation',
          sheetName: 'reservation',
          row:     i + 2, // 1-based, skip header
          timestamp: row[0] || '',
          course:  row[1] || '',
          name:    (row[2] || '') + (row[3] ? ' / ' + row[3] : ''),
          phone:   row[4] || '',
          email:   row[5] || '',
          pay:     row[6] || '',
          remit:   row[7] || '',
          status:  row[resHeaders.length - 1] || '待確認',
          raw:     row,
        });
      });

      // plan rows
      const planHeaders = data.plan[0] || [];
      data.plan.slice(1).forEach((row, i) => {
        if (!row[0]) return;
        allOrders.push({
          type:    'plan',
          sheetName: 'plan',
          row:     i + 2,
          timestamp: row[0] || '',
          course:  row[5] || '', // items
          name:    row[1] || '',
          phone:   row[3] || '',
          email:   row[4] || '',
          pay:     row[8] || '',
          remit:   row[9] || '',
          status:  row[planHeaders.length - 1] || '待確認',
          raw:     row,
        });
      });

      // sort newest first
      allOrders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      updateStats();
      updateBadges();
      populateCourseFilter();
      renderTable();
    } catch(e) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>載入失敗，請重新整理。</p></div>';
    }
  }

  // ── STATS ──
  function updateStats() {
    const counts = { pending:0, checked:0, imported:0, done:0 };
    allOrders.forEach(o => {
      if (o.status === '待確認') counts.pending++;
      else if (o.status === '已對帳') counts.checked++;
      else if (o.status === '已匯入點數') counts.imported++;
      else if (o.status === '已完成') counts.done++;
    });
    document.getElementById('stat-total').textContent   = allOrders.length;
    document.getElementById('stat-pending').textContent  = counts.pending;
    document.getElementById('stat-checked').textContent  = counts.checked;
    document.getElementById('stat-imported').textContent = counts.imported;
    document.getElementById('stat-done').textContent     = counts.done;
  }

  function updateBadges() {
    const res  = allOrders.filter(o => o.type === 'reservation').length;
    const plan = allOrders.filter(o => o.type === 'plan').length;
    document.getElementById('badge-all').textContent  = allOrders.length;
    document.getElementById('badge-res').textContent  = res;
    document.getElementById('badge-plan').textContent = plan;
  }

  // ── COURSE FILTER ──
  function populateCourseFilter() {
    const sel = document.getElementById('filter-course');
    const courses = [...new Set(allOrders.map(o => o.type === 'reservation' ? o.course : '點數方案'))];
    sel.innerHTML = '<option value="">所有課程 / 方案</option>' +
      courses.filter(Boolean).map(c => `<option value="${c}">${c}</option>`).join('');
  }

  // ── VIEW SWITCH ──
  const VIEW_TITLES = {
    all:'全部訂單', reservation:'課程報名', plan:'點數方案',
    pending:'待確認', checked:'已對帳', imported:'已匯入點數', done:'已完成'
  };

  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.view === view);
    });
    document.getElementById('topbar-title').textContent = VIEW_TITLES[view] || view;
    renderTable();
  }

  // ── FILTER ORDERS ──
  function getFiltered() {
    const search = document.getElementById('search-inp').value.trim().toLowerCase();
    const course = document.getElementById('filter-course').value;
    return allOrders.filter(o => {
      // view filter
      if (currentView === 'reservation' && o.type !== 'reservation') return false;
      if (currentView === 'plan'        && o.type !== 'plan')        return false;
      if (currentView === 'pending'     && o.status !== '待確認')    return false;
      if (currentView === 'checked'     && o.status !== '已對帳')    return false;
      if (currentView === 'imported'    && o.status !== '已匯入點數') return false;
      if (currentView === 'done'        && o.status !== '已完成')    return false;
      // course filter
      const oCourse = o.type === 'reservation' ? o.course : '點數方案';
      if (course && oCourse !== course) return false;
      // search
      if (search) {
        const hay = [o.name, o.phone, o.email, o.course, o.timestamp].join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });
  }

  // ── RENDER TABLE ──
  function renderTable() {
    const rows = getFiltered();
    if (!rows.length) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-state"><div class="icon">📭</div><p>目前沒有符合的訂單</p></div>';
      return;
    }

    const html = `
      <table>
        <thead>
          <tr>
            <th>類型</th>
            <th>時間</th>
            <th>姓名</th>
            <th>課程 / 方案</th>
            <th>電話</th>
            <th>繳費</th>
            <th>末五碼</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(o => `
            <tr>
              <td>${o.type === 'reservation'
                ? '<span class="type-badge t-reservation">課程</span>'
                : '<span class="type-badge t-plan">點數</span>'}</td>
              <td style="white-space:nowrap;color:var(--text-secondary);font-size:12px">${formatTime(o.timestamp)}</td>
              <td style="font-weight:500;white-space:nowrap">${o.name}</td>
              <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text-secondary)" title="${o.course}">${o.course}</td>
              <td style="white-space:nowrap">${o.phone}</td>
              <td style="white-space:nowrap;font-size:12px">${o.pay}</td>
              <td style="white-space:nowrap;font-family:monospace">${o.remit || '—'}</td>
              <td>
                <select class="status-select" onchange="updateStatus(this, '${o.sheetName}', ${o.row})">
                  <option value="待確認"   ${o.status==='待確認'   ?'selected':''}>🟠 待確認</option>
                  <option value="已對帳"   ${o.status==='已對帳'   ?'selected':''}>🟢 已對帳</option>
                  <option value="已匯入點數" ${o.status==='已匯入點數'?'selected':''}>🔵 已匯入點數</option>
                  <option value="已完成"   ${o.status==='已完成'   ?'selected':''}>⚪ 已完成</option>
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

    document.getElementById('table-container').innerHTML = html;
  }

  function formatTime(ts) {
    if (!ts) return '—';
    return String(ts).replace(/(\d{4})\/(\d{1,2})\/(\d{1,2})/, '$1/$2/$3').substring(0, 16);
  }

  // ── UPDATE STATUS ──
  async function updateStatus(sel, sheetName, row) {
    const newStatus = sel.value;
    sel.classList.add('saving');
    try {
      await gasCall({ action: 'updateStatus', sheetName, row, status: newStatus });
      // update local data
      const order = allOrders.find(o => o.sheetName === sheetName && o.row === row);
      if (order) order.status = newStatus;
      updateStats();
      toast('✅ 狀態已更新：' + newStatus);
    } catch(e) {
      toast('❌ 更新失敗，請重試');
      sel.value = allOrders.find(o => o.sheetName === sheetName && o.row === row)?.status || '待確認';
    }
    sel.classList.remove('saving');
  }
</script>
</body>
</html>
